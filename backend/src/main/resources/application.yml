spring:
  application:
    name: worker-attendance-overtime-engine

  datasource:
    # Supabase requires SSL; prepareThreshold=0 disables server-side prepared
    # statements, which PgBouncer transaction-mode pooling (port 6543) cannot reuse.
    url: "jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}?sslmode=require&prepareThreshold=0"
    username: ${PGUSER:${DB_USERNAME:postgres}}
    password: ${PGPASSWORD:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  web:
    resources:
      static-locations: classpath:/static/

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        command-timeout: 1500ms
        shutdown-timeout: 100ms

  cache:
    type: redis

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:devSecretKeyMustBeAtLeast32CharactersLong!!}
  expiration: 86400000

app:
  cors:
    # Externalized per environment (comma-separated). Dev defaults to the React app.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
