spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:taskmanager}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${PGUSER:${DB_USERNAME:postgres}}
spring.datasource.password=${PGPASSWORD:${DB_PASSWORD:postgres}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:devSecretKeyMustBeAtLeast32CharactersLong!!}
jwt.expiration=86400000

spring.web.resources.static-locations=classpath:/static/
